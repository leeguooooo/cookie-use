name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build binaries for, e.g. v0.1.0'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            asset: cookie-use-darwin-arm64
          - target: x86_64-apple-darwin
            asset: cookie-use-darwin-x64
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf "${{ matrix.asset }}.tar.gz" cookie-use
          shasum -a 256 "${{ matrix.asset }}.tar.gz" > "${{ matrix.asset }}.tar.gz.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            target/${{ matrix.target }}/release/${{ matrix.asset }}.tar.gz
            target/${{ matrix.target }}/release/${{ matrix.asset }}.tar.gz.sha256
